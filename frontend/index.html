<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>Sambid — Federal Contract Opportunity Alerts &amp; SAM.gov Notifications</title>
    <meta name="description" content="Sambid delivers daily AI-matched federal contract opportunities from SAM.gov, USASpending.gov &amp; FPDS straight to your inbox. Start free — no credit card required." />
    <meta name="keywords" content="federal contract opportunities, SAM.gov alerts, government contracting software, federal procurement notifications, FPDS contract search, small business federal contracts, USASpending opportunities, federal RFP alerts" />
    <meta name="author" content="Sambid" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sambid.co/" />

    <!-- ── Open Graph (Facebook / LinkedIn) ─────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://sambid.co/" />
    <meta property="og:title"       content="Sambid — Federal Contract Alerts from SAM.gov" />
    <meta property="og:description" content="AI-matched federal contract opportunities from SAM.gov, USASpending &amp; FPDS delivered daily. Free 7-day trial for small businesses." />
    <meta property="og:image"       content="https://sambid.co/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Sambid" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@sambidco" />
    <meta name="twitter:title"       content="Sambid — Federal Contract Opportunity Alerts" />
    <meta name="twitter:description" content="Get daily AI-matched federal contract opportunities from SAM.gov straight to your inbox. Free trial, no credit card." />
    <meta name="twitter:image"       content="https://sambid.co/og-image.png" />

    <!-- ── PWA / Mobile ─────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sambid" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml"          href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180"               href="/apple-touch-icon.png" />

    <!-- ── Fonts (Inter) — loaded async so they never block first paint ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
