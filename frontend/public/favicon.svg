<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square bg -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Bell body -->
  <path d="M16 5.5c-3.8 0-6.5 2.8-6.5 6.5v4.5L7.5 19v1.5h17V19l-2-2.5V12c0-3.7-2.7-6.5-6.5-6.5z" fill="white" opacity="0.95"/>
  <!-- Bell clapper -->
  <ellipse cx="16" cy="22.5" rx="2" ry="1.5" fill="white" opacity="0.95"/>
  <!-- Document inside bell -->
  <rect x="12.5" y="9.5" width="7" height="8.5" rx="1" fill="url(#bg)" opacity="0.9"/>
  <!-- Document lines -->
  <line x1="14" y1="11.5" x2="18" y2="11.5" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="13.2" x2="18" y2="13.2" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Checkmark on document -->
  <path d="M14 15.5l1.3 1.3 2.7-2.7" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Signal wave 1 -->
  <path d="M21.5 7.5a4.5 4.5 0 011.5 3" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <!-- Signal wave 2 -->
  <path d="M23 5.5a7.5 7.5 0 012 4.5" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
</svg>
